<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"><meta name="theme-color" content="#fffafa"><title>Francesco Salvuccelli — Eventi-X Group Srl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#fffafa;min-height:100vh;font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:3rem}
.hero{width:100%;background:#fffafa;border-bottom:2px solid #57ff62;padding:2.8rem 1.5rem 2.2rem;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.03) 60px,rgba(255,255,255,0.03) 61px);pointer-events:none}
.corner{position:absolute;width:24px;height:24px;border-color:#57ff62;border-style:solid}
.corner.tl{top:14px;left:14px;border-width:2px 0 0 2px}.corner.tr{top:14px;right:14px;border-width:2px 2px 0 0}
.corner.bl{bottom:14px;left:14px;border-width:0 0 2px 2px}.corner.br{bottom:14px;right:14px;border-width:0 2px 2px 0}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:64px;font-weight:900;line-height:1;display:flex;align-items:baseline;position:relative;z-index:1}
.logo-av{color:#57ff62}.logo-slash{color:#57ff62;font-weight:300;margin:0 3px}.logo-rent{color:#000000}.logo-srl{font-size:22px;font-weight:700;color:#57ff62;margin-left:8px;letter-spacing:1px}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:300;letter-spacing:7px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:6px;position:relative;z-index:1}
.hero-divider{width:60px;height:1px;background:#57ff62;margin-top:1.4rem;opacity:.5;position:relative;z-index:1}
.person{padding:2rem 1.5rem 1.5rem;text-align:center;width:100%;max-width:480px}
.person-name{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700;color:#000000;letter-spacing:2px;text-transform:uppercase}
.person-role{font-size:12px;font-weight:500;color:#57ff62;letter-spacing:3px;text-transform:uppercase;margin-top:5px}
.contacts{width:100%;max-width:480px;padding:0 1.25rem;display:flex;flex-direction:column;gap:2px}
.contact-row{display:flex;align-items:center;gap:14px;padding:15px 18px;background:rgba(255,255,255,0.07);border-left:3px solid #57ff62;text-decoration:none;transition:background .18s}
.contact-row:first-child{border-radius:6px 6px 0 0}.contact-row:last-child{border-radius:0 0 6px 6px}
.contact-row:hover,.contact-row:active{background:rgba(255,255,255,0.11)}
.contact-icon{width:38px;height:38px;background:rgba(255,255,255,0.08);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-icon i{font-size:18px;color:#57ff62}
.contact-label{display:block;font-size:10px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase}
.contact-value{display:block;font-size:15px;font-weight:500;color:#000000;margin-top:2px}
.save-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:calc(100% - 2.5rem);max-width:480px;margin:1.5rem 1.25rem 0;padding:17px;background:#57ff62;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;border:none;border-radius:5px;cursor:pointer;text-decoration:none;-webkit-tap-highlight-color:transparent}
.page-footer{margin-top:2.5rem;text-align:center}
.page-footer span{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.2);text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#57ff62;color:#fff;padding:10px 20px;border-radius:30px;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;transition:transform .3s ease;pointer-events:none;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
</style></head><body>
<div class="hero">
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="logo-text"><span class="logo-av">Ex</span><span class="logo-slash">/</span><span class="logo-rent">Eventi-X</span><span class="logo-srl">SRL</span></div>
  <div class="logo-sub">Events & Television Services</div><div class="hero-divider"></div>
</div>
<div class="person"><div class="person-name">Francesco Salvuccelli</div><div class="person-role">Warehouse Operator</div></div>
<div class="contacts"><a class="contact-row" href="tel:+393470825188"><div class="contact-icon"><i class="ti ti-phone"></i></div><div><span class="contact-label">Cellulare</span><span class="contact-value">+39 347 082 5188</span></div></a><a class="contact-row" href="tel:+393478301248"><div class="contact-icon"><i class="ti ti-building"></i></div><div><span class="contact-label">Simone Petitti</span><span class="contact-value">+39 347 830 1248</span></div></a><a class="contact-row" href="mailto:info@events-x.it"><div class="contact-icon"><i class="ti ti-mail"></i></div><div><span class="contact-label">Email</span><span class="contact-value">info@events-x.it</span></div></a>
  <a class="contact-row" href="https://www.eventixgroup.it" target="_blank" rel="noopener">
    <div class="contact-icon"><i class="ti ti-world"></i></div>
    <div><span class="contact-label">Sito Web</span><span class="contact-value">https://www.eventixgroup.it</span></div>
  </a>
</div>
<a class="save-btn" id="saveBtn" href="#"><i class="ti ti-user-plus"></i> Salva Contatto</a>
<div class="page-footer"><span>Eventi-X Group Srl &mdash; Events & Television Services</span></div>
<div class="toast" id="toast">Contatto salvato!</div>
<script>
const v="BEGIN:VCARD\r\nVERSION:3.0\r\nFN:Francesco Salvuccelli\r\nN:Salvuccelli;Francesco;;;\r\nORG:Eventi-X Group Srl\r\nTITLE:Warehouse Operator\r\nTEL;TYPE=CELL:+39 347 082 5188\r\nTEL;TYPE=WORK:+39 347 830 1248\r\nEMAIL:info@events-x.it\r\nURL:https://www.eventixgroup.it\r\nEND:VCARD";
const blob=new Blob([v],{type:"text/vcard;charset=utf-8"});
const url=URL.createObjectURL(blob);
const btn=document.getElementById("saveBtn");
btn.href=url;btn.download="francesco-salvuccelli.vcf";
btn.addEventListener("click",()=>{const t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);});
</script></body></html>
